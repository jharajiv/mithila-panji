name: Build static GitHub Pages data

on:
  workflow_dispatch:
  push:
    paths:
      - "data/**"
      - ".github/workflows/build-static-data.yml"

permissions:
  contents: write

jobs:
  build-static-data:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Generate docs/data JSON files
        run: python scripts/build_static_data.py

      - name: Commit generated files
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add docs/data/persons.json docs/data/edges.json
          git rm --ignore-unmatch docs/data/graph_sample.json
          git status
          git commit -m "Rebuild static persons/edges data" || echo "No changes to commit"
          git push
